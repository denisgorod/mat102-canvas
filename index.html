<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Canvas Viewer</title>
  <style>
    :root {
      --obs-font-text: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, "Helvetica Neue", Arial, sans-serif;
      --obs-font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --obs-text: #2f3440;
      --obs-muted: #5b6472;
      --obs-border: #d8dee9;
      --obs-bg-soft: #eef2f7;
      --obs-accent: #3b82f6;
      --obs-line: 1.55;
    }

    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #0f1117;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.35s ease;
    }

    #loading-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: min(320px, 80vw);
    }

    #loading-label {
      color: #94a3b8;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      letter-spacing: 0.03em;
    }

    #loading-track {
      width: 100%;
      height: 4px;
      background: rgba(148, 163, 184, 0.15);
      border-radius: 999px;
      overflow: hidden;
    }

    #loading-bar {
      height: 100%;
      width: 0%;
      background: #3b82f6;
      border-radius: 999px;
      transition: width 0.15s ease;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #0f1117;
      color: #ddd;
      font-family: system-ui, sans-serif;
    }

    #canvas-root {
      width: 100vw;
      height: 100vh;
      touch-action: none;
      overscroll-behavior: none;
    }

    /* Override json-canvas-viewer centering so markdown fills node width. */
    .JSON-Canvas-Viewer .JCV-overlay-container .JCV-content.JCV-markdown-content {
      display: block !important;
      justify-content: flex-start !important;
      align-items: stretch !important;
    }

    .JSON-Canvas-Viewer .JCV-overlay-container .JCV-parsed-content-wrapper {
      width: 100% !important;
      max-width: 100% !important;
      box-sizing: border-box !important;
    }

    /* Keep markdown typography close to Obsidian reading view with minimal rules. */
    .JSON-Canvas-Viewer .JCV-overlay-container .JCV-content.JCV-markdown-content .JCV-parsed-content-wrapper {
      font-family: var(--obs-font-text) !important;
      font-size: 16px;
      line-height: var(--obs-line);
      color: var(--obs-text);
      font-weight: 400;
      letter-spacing: 0;
      word-spacing: 0;
    }

    .JSON-Canvas-Viewer .JCV-markdown-content .JCV-parsed-content-wrapper > * {
      margin: 0 0 0.8em 0;
    }

    .JSON-Canvas-Viewer .JCV-markdown-content .JCV-parsed-content-wrapper > *:first-child {
      margin-top: 0;
    }

    .JSON-Canvas-Viewer .JCV-markdown-content .JCV-parsed-content-wrapper > *:last-child {
      margin-bottom: 0;
    }

    .JSON-Canvas-Viewer .JCV-markdown-content h1,
    .JSON-Canvas-Viewer .JCV-markdown-content h2,
    .JSON-Canvas-Viewer .JCV-markdown-content h3,
    .JSON-Canvas-Viewer .JCV-markdown-content h4,
    .JSON-Canvas-Viewer .JCV-markdown-content h5,
    .JSON-Canvas-Viewer .JCV-markdown-content h6 {
      color: #1f2937;
      font-weight: 700;
      line-height: 1.3;
      margin: 0.35em 0 0.55em;
      letter-spacing: 0;
    }

    .JSON-Canvas-Viewer .JCV-markdown-content h1 { font-size: 1.55em; }
    .JSON-Canvas-Viewer .JCV-markdown-content h2 { font-size: 1.36em; }
    .JSON-Canvas-Viewer .JCV-markdown-content h3 { font-size: 1.2em; }
    .JSON-Canvas-Viewer .JCV-markdown-content h4 { font-size: 1.07em; }
    .JSON-Canvas-Viewer .JCV-markdown-content h5,
    .JSON-Canvas-Viewer .JCV-markdown-content h6 { font-size: 1em; }

    .JSON-Canvas-Viewer .JCV-markdown-content p,
    .JSON-Canvas-Viewer .JCV-markdown-content li {
      color: var(--obs-text);
      line-height: var(--obs-line);
      margin: 0;
    }

    .JSON-Canvas-Viewer .JCV-markdown-content ul,
    .JSON-Canvas-Viewer .JCV-markdown-content ol {
      margin: 0.2em 0 0.85em 1.35em;
      padding: 0;
    }

    .JSON-Canvas-Viewer .JCV-markdown-content li + li {
      margin-top: 0.15em;
    }

    .JSON-Canvas-Viewer .JCV-markdown-content strong {
      font-weight: 650;
      color: #252b36;
    }

    .JSON-Canvas-Viewer .JCV-markdown-content em {
      color: #3b4252;
    }

    .JSON-Canvas-Viewer .JCV-markdown-content a {
      color: var(--obs-accent);
      text-decoration: none;
    }

    .JSON-Canvas-Viewer .JCV-markdown-content a:hover {
      text-decoration: underline;
    }

    .JSON-Canvas-Viewer .JCV-markdown-content blockquote {
      margin: 0.4em 0 0.85em;
      padding: 0.35em 0.9em;
      border-left: 3px solid #c8d2e1;
      color: var(--obs-muted);
      background: rgba(148, 163, 184, 0.08);
      border-radius: 4px;
    }

    .JSON-Canvas-Viewer .JCV-markdown-content code {
      font-family: var(--obs-font-mono);
      font-size: 0.9em;
      background: rgba(148, 163, 184, 0.18);
      border: 1px solid rgba(148, 163, 184, 0.34);
      border-radius: 4px;
      padding: 0.08em 0.32em;
    }

    .JSON-Canvas-Viewer .JCV-markdown-content pre {
      margin: 0.45em 0 0.95em;
      padding: 0.7em 0.8em;
      background: var(--obs-bg-soft);
      border: 1px solid var(--obs-border);
      border-radius: 8px;
      overflow: auto;
    }

    .JSON-Canvas-Viewer .JCV-markdown-content pre code {
      border: none;
      background: transparent;
      padding: 0;
      font-size: 0.88em;
    }

    .JSON-Canvas-Viewer .JCV-markdown-content hr {
      margin: 0.95em 0;
      border: none;
      border-top: 1px solid #d7dce6;
    }

    /* File embeds should remain scrollable even when node is not in JCV-active state. */
    .JSON-Canvas-Viewer .JCV-overlay-container.node-type-file .JCV-content.JCV-markdown-content + .JCV-click-layer {
      pointer-events: none !important;
    }

    .JSON-Canvas-Viewer .JCV-overlay-container.node-type-file .JCV-content.JCV-markdown-content .JCV-parsed-content-wrapper {
      overflow-y: auto !important;
      overflow-x: hidden !important;
      pointer-events: auto !important;
      max-height: 100% !important;
      height: 100% !important;
      box-sizing: border-box !important;
      border-radius: 10px;
      overscroll-behavior: contain;
      scrollbar-gutter: auto !important;
      scrollbar-width: thin;
      scrollbar-color: rgba(71, 85, 105, 0.85) transparent;
    }

    .JSON-Canvas-Viewer .JCV-overlay-container.node-type-file .JCV-content.JCV-markdown-content .JCV-parsed-content-wrapper::-webkit-scrollbar {
      width: 8px;
    }

    .JSON-Canvas-Viewer .JCV-overlay-container.node-type-file .JCV-content.JCV-markdown-content .JCV-parsed-content-wrapper::-webkit-scrollbar-track {
      background: transparent;
    }

    .JSON-Canvas-Viewer .JCV-overlay-container.node-type-file .JCV-content.JCV-markdown-content .JCV-parsed-content-wrapper::-webkit-scrollbar-thumb {
      background: rgba(71, 85, 105, 0.82);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    .JSON-Canvas-Viewer .JCV-overlay-container.node-type-file .JCV-content.JCV-markdown-content .JCV-parsed-content-wrapper::-webkit-scrollbar-thumb:hover {
      background: rgba(51, 65, 85, 0.96);
    }

    /* Optional: edge labels styling */
    .jcv-edge-label {
      background: rgba(0,0,0,0.7);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    .edge-label-box {
      position: absolute;
      transform: translate(-50%, -50%);
      border: none;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 14px;
      line-height: 1.2;
      white-space: normal;
      text-wrap: pretty;
      word-break: break-word;
      text-align: center;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.2);
      cursor: pointer;
    }

    .JCV-overlay-container.is-collapsed-hidden {
      display: none !important;
    }

    .group-header-box {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 2px 8px;
      box-sizing: border-box;
      pointer-events: auto;
      user-select: none;
    }

    .group-title-hitbox {
      flex: 1 1 auto;
      min-height: 26px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
    }

    .group-toggle-button {
      margin-left: auto;
      width: 22px;
      height: 22px;
      border: 1px solid rgba(100, 116, 139, 0.7);
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.9);
      color: #334155;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      flex: 0 0 auto;
    }

    .group-collapse-mask {
      position: absolute;
      background: rgba(241, 245, 249, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.7);
      border-top: none;
      box-sizing: border-box;
      pointer-events: auto;
    }

    .outgoing-panel {
      position: absolute;
      right: 12px;
      top: 12px;
      width: min(360px, calc(100vw - 24px));
      max-height: min(48vh, 420px);
      background: rgba(17, 24, 39, 0.88);
      color: #e5e7eb;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 10px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(4px);
      padding: 10px;
      display: none;
      z-index: 40;
      overflow: auto;
      pointer-events: auto;
    }

    .outgoing-panel.is-visible {
      display: block;
    }

    .outgoing-title {
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 700;
      opacity: 0.85;
      margin: 0;
    }

    .outgoing-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .outgoing-list {
      display: grid;
      gap: 6px;
    }

    .outgoing-back {
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(30, 41, 59, 0.72);
      color: #f8fafc;
      border-radius: 7px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .outgoing-back:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .outgoing-link {
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: rgba(30, 41, 59, 0.82);
      color: #f8fafc;
      border-radius: 8px;
      padding: 8px 10px;
      text-align: left;
      font-size: 13px;
      line-height: 1.25;
      cursor: pointer;
    }

    .outgoing-link:hover {
      background: rgba(51, 65, 85, 0.9);
      border-color: rgba(148, 163, 184, 0.7);
    }

    @media (max-width: 800px) {
      .outgoing-panel {
        left: 10px;
        right: 10px;
        top: auto;
        bottom: 10px;
        width: auto;
        max-height: 38vh;
        padding: 8px;
      }

      .outgoing-title {
        font-size: 11px;
      }

      .outgoing-header {
        margin-bottom: 6px;
      }

      .outgoing-back {
        min-height: 36px;
        font-size: 13px;
        padding: 6px 10px;
      }

      .outgoing-link {
        min-height: 40px;
        font-size: 14px;
        padding: 9px 11px;
      }

      .edge-label-box {
        font-size: 13px;
        line-height: 1.25;
        padding: 4px 8px;
      }

      .group-header-box {
        min-height: 28px;
        padding: 2px 6px;
      }

      .group-title-hitbox {
        min-height: 24px;
      }

      .group-toggle-button {
        width: 24px;
        height: 24px;
      }
    }

    .callout {
      --callout-color: #3b82f6;
      border-left: 4px solid var(--callout-color);
      background: rgba(59, 130, 246, 0.12);
      padding: 12px 16px;
      margin: 12px 0;
      border-radius: 6px;
    }

    .callout-title {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--callout-color);
      margin-bottom: 8px;
    }

    .callout-content > :first-child {
      margin-top: 0;
    }

    .callout-content > :last-child {
      margin-bottom: 0;
    }

    .callout-definition { --callout-color: #3b82f6; background: rgba(59, 130, 246, 0.12); }
    .callout-exercise { --callout-color: #8b5cf6; background: rgba(139, 92, 246, 0.12); }
    .callout-statement { --callout-color: #10b981; background: rgba(16, 185, 129, 0.12); }
    .callout-proof { --callout-color: #f59e0b; background: rgba(245, 158, 11, 0.12); }
    .callout-theorem { --callout-color: #ef4444; background: rgba(239, 68, 68, 0.12); }
    .callout-note { --callout-color: #3b82f6; background: rgba(59, 130, 246, 0.12); }
    .callout-info { --callout-color: #06b6d4; background: rgba(6, 182, 212, 0.12); }
    .callout-tip { --callout-color: #10b981; background: rgba(16, 185, 129, 0.12); }
    .callout-warning { --callout-color: #f59e0b; background: rgba(245, 158, 11, 0.12); }
    .callout-example { --callout-color: #8b5cf6; background: rgba(139, 92, 246, 0.12); }
    .callout-quote { --callout-color: #6b7280; background: rgba(107, 114, 128, 0.12); }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div id="loading-content">
    <div id="loading-label">Loading…</div>
    <div id="loading-track">
      <div id="loading-bar"></div>
    </div>
  </div>
</div>

<div id="canvas-root"></div>

<script>
  window.MathJax = {
    tex: {
      inlineMath: [["$", "$"], ["\\(", "\\)"]],
      displayMath: [["$$", "$$"], ["\\[", "\\]"]]
    },
    options: {
      skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
    },
    startup: {
      typeset: false  // Typesetting is handled lazily per-node in viewer.js
    }
  };
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<script type="module" src="./viewer.js"></script>

</body>
</html>
