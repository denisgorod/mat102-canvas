<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Canvas Viewer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #0f1117;
      color: #ddd;
      font-family: system-ui, sans-serif;
    }

    #canvas-root {
      width: 100vw;
      height: 100vh;
      touch-action: none;
      overscroll-behavior: none;
    }

    /* Override json-canvas-viewer centering so markdown fills node width. */
    .JSON-Canvas-Viewer .JCV-overlay-container .JCV-content.JCV-markdown-content {
      display: block !important;
      justify-content: flex-start !important;
      align-items: stretch !important;
    }

    .JSON-Canvas-Viewer .JCV-overlay-container .JCV-parsed-content-wrapper {
      width: 100% !important;
      max-width: 100% !important;
      box-sizing: border-box !important;
    }

    /* File embeds should remain scrollable even when node is not in JCV-active state. */
    .JSON-Canvas-Viewer .JCV-overlay-container.node-type-file .JCV-content.JCV-markdown-content + .JCV-click-layer {
      pointer-events: none !important;
    }

    .JSON-Canvas-Viewer .JCV-overlay-container.node-type-file .JCV-content.JCV-markdown-content .JCV-parsed-content-wrapper {
      overflow-y: auto !important;
      overflow-x: hidden !important;
      pointer-events: auto !important;
      max-height: 100% !important;
      height: 100% !important;
      box-sizing: border-box !important;
      border-radius: 10px;
      overscroll-behavior: contain;
      scrollbar-gutter: auto !important;
      scrollbar-width: thin;
      scrollbar-color: rgba(71, 85, 105, 0.85) transparent;
    }

    .JSON-Canvas-Viewer .JCV-overlay-container.node-type-file .JCV-content.JCV-markdown-content .JCV-parsed-content-wrapper::-webkit-scrollbar {
      width: 8px;
    }

    .JSON-Canvas-Viewer .JCV-overlay-container.node-type-file .JCV-content.JCV-markdown-content .JCV-parsed-content-wrapper::-webkit-scrollbar-track {
      background: transparent;
    }

    .JSON-Canvas-Viewer .JCV-overlay-container.node-type-file .JCV-content.JCV-markdown-content .JCV-parsed-content-wrapper::-webkit-scrollbar-thumb {
      background: rgba(71, 85, 105, 0.82);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    .JSON-Canvas-Viewer .JCV-overlay-container.node-type-file .JCV-content.JCV-markdown-content .JCV-parsed-content-wrapper::-webkit-scrollbar-thumb:hover {
      background: rgba(51, 65, 85, 0.96);
    }

    /* Optional: edge labels styling */
    .jcv-edge-label {
      background: rgba(0,0,0,0.7);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    .edge-label-box {
      position: absolute;
      transform: translate(-50%, -50%);
      border: none;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 14px;
      line-height: 1.2;
      white-space: normal;
      text-wrap: pretty;
      word-break: break-word;
      text-align: center;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.2);
      cursor: pointer;
    }

    .JCV-overlay-container.is-collapsed-hidden {
      display: none !important;
    }

    .group-header-box {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 2px 8px;
      border-radius: 6px 6px 0 0;
      background: rgba(226, 232, 240, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.7);
      border-bottom: none;
      box-sizing: border-box;
      pointer-events: auto;
      color: #1f2937;
      user-select: none;
    }

    .group-header-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .group-toggle-button {
      width: 22px;
      height: 22px;
      border: 1px solid rgba(100, 116, 139, 0.7);
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.9);
      color: #334155;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      flex: 0 0 auto;
    }

    .group-collapse-mask {
      position: absolute;
      background: rgba(241, 245, 249, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.7);
      border-top: none;
      box-sizing: border-box;
      pointer-events: auto;
    }

    .outgoing-panel {
      position: absolute;
      right: 12px;
      top: 12px;
      width: min(360px, calc(100vw - 24px));
      max-height: min(48vh, 420px);
      background: rgba(17, 24, 39, 0.88);
      color: #e5e7eb;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 10px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(4px);
      padding: 10px;
      display: none;
      z-index: 40;
      overflow: auto;
      pointer-events: auto;
    }

    .outgoing-panel.is-visible {
      display: block;
    }

    .outgoing-title {
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 700;
      opacity: 0.85;
      margin-bottom: 8px;
    }

    .outgoing-list {
      display: grid;
      gap: 6px;
    }

    .outgoing-link {
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: rgba(30, 41, 59, 0.82);
      color: #f8fafc;
      border-radius: 8px;
      padding: 8px 10px;
      text-align: left;
      font-size: 13px;
      line-height: 1.25;
      cursor: pointer;
    }

    .outgoing-link:hover {
      background: rgba(51, 65, 85, 0.9);
      border-color: rgba(148, 163, 184, 0.7);
    }

    @media (max-width: 800px) {
      .outgoing-panel {
        left: 10px;
        right: 10px;
        top: auto;
        bottom: 10px;
        width: auto;
        max-height: 38vh;
        padding: 8px;
      }

      .outgoing-title {
        font-size: 11px;
        margin-bottom: 6px;
      }

      .outgoing-link {
        min-height: 40px;
        font-size: 14px;
        padding: 9px 11px;
      }

      .edge-label-box {
        font-size: 13px;
        line-height: 1.25;
        padding: 4px 8px;
      }

      .group-header-box {
        min-height: 28px;
        padding: 2px 6px;
      }

      .group-header-title {
        font-size: 13px;
      }

      .group-toggle-button {
        width: 24px;
        height: 24px;
      }
    }

    .callout {
      --callout-color: #3b82f6;
      border-left: 4px solid var(--callout-color);
      background: rgba(59, 130, 246, 0.12);
      padding: 12px 16px;
      margin: 12px 0;
      border-radius: 6px;
    }

    .callout-title {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--callout-color);
      margin-bottom: 8px;
    }

    .callout-content > :first-child {
      margin-top: 0;
    }

    .callout-content > :last-child {
      margin-bottom: 0;
    }

    .callout-definition { --callout-color: #3b82f6; background: rgba(59, 130, 246, 0.12); }
    .callout-exercise { --callout-color: #8b5cf6; background: rgba(139, 92, 246, 0.12); }
    .callout-statement { --callout-color: #10b981; background: rgba(16, 185, 129, 0.12); }
    .callout-proof { --callout-color: #f59e0b; background: rgba(245, 158, 11, 0.12); }
    .callout-theorem { --callout-color: #ef4444; background: rgba(239, 68, 68, 0.12); }
    .callout-note { --callout-color: #3b82f6; background: rgba(59, 130, 246, 0.12); }
    .callout-info { --callout-color: #06b6d4; background: rgba(6, 182, 212, 0.12); }
    .callout-tip { --callout-color: #10b981; background: rgba(16, 185, 129, 0.12); }
    .callout-warning { --callout-color: #f59e0b; background: rgba(245, 158, 11, 0.12); }
    .callout-example { --callout-color: #8b5cf6; background: rgba(139, 92, 246, 0.12); }
    .callout-quote { --callout-color: #6b7280; background: rgba(107, 114, 128, 0.12); }
  </style>
</head>
<body>

<div id="canvas-root"></div>

<script>
  window.MathJax = {
    tex: {
      inlineMath: [["$", "$"], ["\\(", "\\)"]],
      displayMath: [["$$", "$$"], ["\\[", "\\]"]]
    },
    options: {
      skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
    }
  };
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<script type="module" src="./viewer.js"></script>

</body>
</html>
