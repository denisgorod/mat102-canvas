<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Canvas Viewer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0f1117;
      color: #ddd;
      font-family: system-ui, sans-serif;
    }

    #canvas-root {
      width: 100vw;
      height: 100vh;
    }

    /* Override json-canvas-viewer centering so markdown fills node width. */
    .JSON-Canvas-Viewer .JCV-overlay-container .JCV-content.JCV-markdown-content {
      display: block !important;
      justify-content: flex-start !important;
      align-items: stretch !important;
    }

    .JSON-Canvas-Viewer .JCV-overlay-container .JCV-parsed-content-wrapper {
      width: 100% !important;
      max-width: 100% !important;
      box-sizing: border-box !important;
    }

    /* Optional: edge labels styling */
    .jcv-edge-label {
      background: rgba(0,0,0,0.7);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    .edge-label-box {
      position: absolute;
      transform: translate(-50%, -50%);
      border: none;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 14px;
      line-height: 1.2;
      white-space: normal;
      text-wrap: pretty;
      word-break: break-word;
      text-align: center;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.2);
      cursor: pointer;
    }

    .outgoing-panel {
      position: absolute;
      right: 12px;
      top: 12px;
      width: min(360px, calc(100vw - 24px));
      max-height: min(48vh, 420px);
      background: rgba(17, 24, 39, 0.88);
      color: #e5e7eb;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 10px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(4px);
      padding: 10px;
      display: none;
      z-index: 40;
      overflow: auto;
      pointer-events: auto;
    }

    .outgoing-panel.is-visible {
      display: block;
    }

    .outgoing-title {
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 700;
      opacity: 0.85;
      margin-bottom: 8px;
    }

    .outgoing-list {
      display: grid;
      gap: 6px;
    }

    .outgoing-link {
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: rgba(30, 41, 59, 0.82);
      color: #f8fafc;
      border-radius: 8px;
      padding: 8px 10px;
      text-align: left;
      font-size: 13px;
      line-height: 1.25;
      cursor: pointer;
    }

    .outgoing-link:hover {
      background: rgba(51, 65, 85, 0.9);
      border-color: rgba(148, 163, 184, 0.7);
    }

    .callout {
      --callout-color: #3b82f6;
      border-left: 4px solid var(--callout-color);
      background: rgba(59, 130, 246, 0.12);
      padding: 12px 16px;
      margin: 12px 0;
      border-radius: 6px;
    }

    .callout-title {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--callout-color);
      margin-bottom: 8px;
    }

    .callout-content > :first-child {
      margin-top: 0;
    }

    .callout-content > :last-child {
      margin-bottom: 0;
    }

    .callout-definition { --callout-color: #3b82f6; background: rgba(59, 130, 246, 0.12); }
    .callout-exercise { --callout-color: #8b5cf6; background: rgba(139, 92, 246, 0.12); }
    .callout-statement { --callout-color: #10b981; background: rgba(16, 185, 129, 0.12); }
    .callout-proof { --callout-color: #f59e0b; background: rgba(245, 158, 11, 0.12); }
    .callout-theorem { --callout-color: #ef4444; background: rgba(239, 68, 68, 0.12); }
    .callout-note { --callout-color: #3b82f6; background: rgba(59, 130, 246, 0.12); }
    .callout-info { --callout-color: #06b6d4; background: rgba(6, 182, 212, 0.12); }
    .callout-tip { --callout-color: #10b981; background: rgba(16, 185, 129, 0.12); }
    .callout-warning { --callout-color: #f59e0b; background: rgba(245, 158, 11, 0.12); }
    .callout-example { --callout-color: #8b5cf6; background: rgba(139, 92, 246, 0.12); }
    .callout-quote { --callout-color: #6b7280; background: rgba(107, 114, 128, 0.12); }
  </style>
</head>
<body>

<div id="canvas-root"></div>

<script>
  window.MathJax = {
    tex: {
      inlineMath: [["$", "$"], ["\\(", "\\)"]],
      displayMath: [["$$", "$$"], ["\\[", "\\]"]]
    },
    options: {
      skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
    }
  };
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<script type="module" src="./viewer.js"></script>

</body>
</html>
